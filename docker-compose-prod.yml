services:
  fluent-bit:
    image: fluent/fluent-bit:3.2
    container_name: interview-fluent-bit
    volumes:
      - ./docker/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./docker/fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
    ports:
      - "24224:24224"
    environment:
      - ELASTIC_USERNAME=${ELASTIC_USERNAME}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    networks:
      - interview-network
      - logging-network
    restart: unless-stopped

  postgres:
    image: postgres:17
    container_name: interview-postgres
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - interview-network
    restart: unless-stopped

  app:
    image: ghcr.io/wisoft-prepair/backend-java:latest
    container_name: interview-api
    ports:
      - "7300:7300"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - TZ=Asia/Seoul
    depends_on:
      postgres:
        condition: service_healthy
      fluent-bit:
        condition: service_started
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        tag: interview-service
        fluentd-async: "true"
    networks:
      - interview-network
    restart: unless-stopped

volumes:
  postgres-data:

networks:
  interview-network:
    driver: bridge
  logging-network:
    external: true