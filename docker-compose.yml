services:
  # Fluent-Bit
  fluent-bit:
    image: fluent/fluent-bit:latest
    container_name: interview-fluent-bit
    volumes:
      - ./docker/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./docker/fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
    ports:
      - "24224:24224"
    environment:
      - ELASTIC_USERNAME=${ELASTIC_USERNAME}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    networks:
      - logging-network

  # PostgreSQL
  postgres:
    image: postgres:17
    container_name: interview-postgres
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # Spring Boot Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: interview-api
    ports:
      - "7300:7300"
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - fluent-bit
      - postgres
    logging:
      driver: fluentd
      options:
        fluentd-address: localhost:24224
        tag: interview-service
        fluentd-async: "true"

volumes:
  postgres-data:

networks:
  logging-network:
    external: true
