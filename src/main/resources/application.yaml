server:
  port: 7300

logging:
  pattern:
    console: "%clr(%d{HH:mm:ss}){faint} %clr([%15.15thread]){magenta} %clr(%-5level){highlight} %clr(%logger{36}){cyan} - %msg%n"
  level:
    io.wisoft.prepair: DEBUG

spring:
  application:
    name: prepair-backend-java-api

  profiles:
    active: local

  config:
    import: optional:file:.env[.properties]

  servlet:
    multipart:
      max-file-size: 150MB
      max-request-size: 155MB

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME}
    password: ${GMAIL_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

external:
  member-service:
    url: https://prepair.wisoft.dev
    api-key: ${MEMBER_SERVICE_API_KEY}

  openai:
    api-key: ${OPENAI_API_KEY}
    api-url: https://api.openai.com/v1/chat/completions
    model: gpt-4o-mini
    whisper-url: https://api.openai.com/v1/audio/transcriptions
    whisper-model: whisper-1

cloud:
  aws:
    s3:
      endpoint: ${S3_ENDPOINT}
      access-key: ${AWS_ACCESS_KEY_ID}
      secret-key: ${AWS_SECRET_ACCESS_KEY}
      region: ${AWS_REGION}
      bucket: prepair
      presigned-url-expiration: 3600
