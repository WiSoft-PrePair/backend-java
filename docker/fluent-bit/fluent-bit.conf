[SERVICE]
    Flush        1
    Log_Level    info
    Parsers_File parsers.conf

[INPUT]
    Name         forward
    Listen       0.0.0.0
    Port         24224

[FILTER]
    Name         parser
    Match        *
    Key_Name     log
    Parser       json
    Reserve_Data On

[OUTPUT]
    Name            es
    Match           *
    Host            elasticsearch
    Port            9200
    HTTP_User       ${ELASTIC_USERNAME}
    HTTP_Passwd     ${ELASTIC_PASSWORD}
    Index           interview-service
    Retry_Limit     5
    Suppress_Type_Name On
